<html lang="en">

<head>

<body>

<nav>

<div class="logo">

<i class="fa-solid fa-square-parking"></i>

ParkWise

<section class="paymentPage">

Complete Payment

<p>

Secure your parking slot.

</p>

</h2>

<div class="row">

<span>

</span>

</div>

<div class="row">

<span>

Duration

</span>

<span>

1 Hour

</div>

<div class="row">

<span>

Parking Fee

<span>

</div>

<div class="row total">

<span>

Total

</span>

<span>

₹40

</span>

</h2>

<div class="methods">

<div class="method active">

<i class="fa-brands fa-google-pay"></i>

<p>

UPI

</div>

<div class="method">

💳

<p>

Card

</p>

</div>

<div class="method">

👛

<p>

Wallet

</p>

</div>

</div>

</button>

</div>
